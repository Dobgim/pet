<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | Little Paws Boutique</title>
  <link rel="icon" type="image/jpeg" href="assets/logo.jpg">
  <!-- Protect this page before it renders -->
  <script src="js/admin-auth.js"></script>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .admin-container {
      display: grid;
      grid-template-columns: 1fr 2fr;
      gap: 3rem;
      padding: 120px 2rem 60px;
      max-width: 1400px;
      margin: 0 auto;
    }

    .admin-header {
      grid-column: 1 / -1;
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 2px solid var(--border-color);
    }

    .admin-form-panel {
      background: white;
      padding: 2.5rem;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      height: fit-content;
    }

    .admin-form-panel h3 {
      font-family: var(--font-display);
      color: var(--primary-color);
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 600;
      color: var(--text-dark);
    }

    .form-control {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-sm);
      font-family: inherit;
    }

    .form-control:focus {
      border-color: var(--primary-color);
      outline: none;
    }

    .admin-list-panel {
      background: white;
      padding: 2.5rem;
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
    }

    .table-responsive {
      overflow-x: auto;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1rem;
    }

    th, td {
      padding: 1rem;
      text-align: left;
      border-bottom: 1px solid var(--border-color);
    }

    th {
      background-color: var(--bg-secondary);
      font-weight: 600;
      color: var(--text-dark);
    }

    td img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: var(--radius-sm);
    }

    .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 1.2rem;
      color: var(--accent-color);
      transition: var(--transition);
    }

    .action-btn:hover {
      transform: scale(1.1);
      color: red;
    }

    .status-badge {
      padding: 0.3rem 0.8rem;
      border-radius: 50px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .status-available { background: #e8f5e9; color: #2e7d32; }
    .status-reserved { background: #eeeeee; color: #616161; }

    @media (max-width: 992px) {
      .admin-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body style="background-color: #f4f6f9;">

  <!-- NAVBAR -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <img src="assets/logo.jpg" alt="Logo" class="logo-icon-img">
        Little Paws
      </a>
      
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="track.html">Track Puppy</a>
        <a href="puppies.html">View Live Site <i class="fas fa-external-link-alt" style="font-size: 0.8rem;"></i></a>
      </div>
    </div>
  </nav>

  <div class="admin-container">
    <div class="admin-header">
      <h2><i class="fas fa-cog"></i> Store Management</h2>
      <button class="btn btn-outline" onclick="clearData()">Factory Reset Data</button>
    </div>

    <!-- FORM PANEL -->
    <div class="admin-form-panel">
      <h3>Add New Puppy</h3>
      <form id="addPuppyForm">
        <div class="form-group">
          <label>Puppy Name</label>
          <input type="text" id="pName" class="form-control" required placeholder="e.g. Luna">
        </div>

        <div class="form-group">
          <label>Breed</label>
          <select id="pBreed" class="form-control" required>
            <option value="Pomeranian">Pomeranian</option>
            <option value="Golden Doodle">Golden Doodle</option>
            <option value="French Bulldog">French Bulldog</option>
            <option value="Shih Tzu">Shih Tzu</option>
            <option value="Yorkie">Yorkie</option>
            <option value="Cavapoo">Cavapoo</option>
            <option value="Chihuahua">Chihuahua</option>
            <option value="Dachshund">Dachshund</option>
          </select>
        </div>
        <div class="form-group">
          <label>Age</label>
          <input type="text" id="pAge" class="form-control" required placeholder="e.g. 8 Weeks">
        </div>
        <div class="form-group">
          <label>Gender</label>
          <select id="pGender" class="form-control">
            <option value="Female">Female</option>
            <option value="Male">Male</option>
          </select>
        </div>
        <div class="form-group">
          <label>Price ($)</label>
          <input type="number" id="pPrice" class="form-control" required placeholder="e.g. 2500" min="0">
        </div>
        <div class="form-group">
          <label>Select Puppy Image</label>
          <input type="file" id="image_file" class="form-control" accept="image/*" required>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          <i class="fas fa-plus"></i> Post Puppy
        </button>
      </form>
    </div>

    <!-- LIST PANEL -->
    <div class="admin-list-panel">
      <h3>Active Inventory</h3>
      <p style="color: #666; margin-bottom: 1rem;">These puppies are currently live on the website gallery.</p>
      
      <div class="table-responsive">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Image</th>
              <th>Tracking Code</th>
              <th>Name</th>
              <th>Breed</th>
              <th>Price</th>
              <th>Gender</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="adminPuppyTableBody">
            <!-- Rendered via JS -->
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-client.js?v=3"></script>
  <script src="js/admin.js?v=3"></script>
</body>
</html>
